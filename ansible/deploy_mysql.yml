---
- name: Deploy MySQL 8.0 and Setup Database
  hosts: all
  become: yes
  vars:
    mysql_root_password: "root_password_123"
    mysql_temp_user: "sys_temp"
    mysql_temp_password: "temp_password_123"

  tasks:
    - name: Install Docker and dependencies
      apt:
        name: 
          - docker.io
          - python3-pip
        state: present
        update_cache: yes

    - name: Install PyMySQL (needed for Ansible mysql modules)
      pip:
        name: pymysql

    - name: Run MySQL 8.0 Container
      docker_container:
        name: mysql_server
        image: mysql:8.0
        state: started
        restart_policy: always
        env:
          MYSQL_ROOT_PASSWORD: "{{ mysql_root_password }}"
        published_ports:
          - "3306:3306"

    - name: Wait for MySQL to be ready
      wait_for:
        port: 3306
        host: "{{ ansible_host }}"
        delay: 10

    - name: Create sys_temp user
      community.mysql.mysql_user:
        login_host: "127.0.0.1"
        login_user: "root"
        login_password: "{{ mysql_root_password }}"
        name: "{{ mysql_temp_user }}"
        password: "{{ mysql_temp_password }}"
        priv: "*.*:ALL,GRANT"
        state: present
        host: "%"
        column_case_sensitive: false

    - name: Copy Sakila DB to server
      copy:
        src: ./sakila-db.zip        
        dest: /tmp/sakila-db.zip    
        mode: '0644'

    - name: Install unzip
      apt:
        name: unzip
        state: present
        update_cache: yes    

    - name: Unarchive Sakila DB
      unarchive:
        src: /tmp/sakila-db.zip
        dest: /tmp/
        remote_src: yes

    - name: Copy Sakila dump into container
      shell: |
        docker cp /tmp/sakila-db/sakila-schema.sql mysql_server:/tmp/
        docker cp /tmp/sakila-db/sakila-data.sql mysql_server:/tmp/

    - name: Restore Sakila database
      shell: |
        docker exec mysql_server mysql -u root -p{{ mysql_root_password }} -e "SOURCE /tmp/sakila-schema.sql;"
        docker exec mysql_server mysql -u root -p{{ mysql_root_password }} -e "SOURCE /tmp/sakila-data.sql;"