services:
  rmq01:
    image: rabbitmq:3.12-management
    container_name: rmq01
    hostname: rmq01
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=andrei
      - RABBITMQ_DEFAULT_PASS=ximera
    networks:
      - rmq-net

  python-scripts:
    image: python:3.9-slim
    container_name: rmq-scripts
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    tty: true  # Это не даст контейнеру погаснуть
    depends_on:
      - rmq01
    networks:
      - rmq-net
   

networks:
  rmq-net:
    driver: bridge